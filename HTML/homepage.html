 <!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Home Page</title>
        <link rel="stylesheet" href="/CSS/home.css">
    </head>
    <body>
        <form id="form" method="POST">
            <div id="container">
                <div id="links">
                    <ul>
                        <li><a href="#about">About us</a></li>
                        <li><a href="/HTML/loginForm.html">logout</a></li>
                        <li><a href="#services">Services</a></li>
                    </ul>
                </div>
            </div>
            <h3>PRESIDENT ELECTION SYSTEM</h3>
            <h4>SELECT A CANDIDATE</h4>
            <div id="imageContainer">
                <div id="image1" class="candidate-card"
                    data-candidate-name="samia s. hassan">
                    <img src="/IMAGES/samia1.jpg" alt="Samia S. Hassan">
                    <div id="message1">
                        <span id="notification1"></span>
                    </div>
                    <div>
                        <span class="candidate-name">SAMIA S. HASSAN</span>
                    </div>
                </div>
                <div id="image2" class="candidate-card"
                    data-candidate-name="tundu a. lissu">
                    <img src="/IMAGES/lissu1.jpg" alt="Tundu A. Lissu">
                    <div id="message2">
                        <span id="notification2"></span>
                    </div>
                    <div>
                        <span class="candidate-name">TUNDU A. LISSU</span>
                    </div>
                </div>
            </div>
            <input type="hidden" name="candidate_name" id="candidate_name" value="">
            <input type="hidden" name="userID" id="userID" value>
            <div id="submitContainer">
                <input type="submit" id="submitBtn" value="submit">
            </div>
            <div id="popup" class="popup-hidden">
                <div id="popupMessage"></div>
                <button type="button" id="popupClose">Close</button>
            </div>
        </form>
        <script src="/JS/home.js"></script>
    </body>
</html>
