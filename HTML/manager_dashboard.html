<?php
session_start();

if (!isset($_SESSION['is_logged_in']) || $_SESSION['is_logged_in'] !== true) {
    header('Location: login.html');
    exit();
}

if ($_SESSION['user_role'] !== 'manager') {
    header('Location: no-access.html');
    exit();
}

$user_name = $_SESSION['user_name'] ?? 'Manager';
$user_first_name = $_SESSION['user_first_name'] ?? '';
if (empty($user_first_name)) {
    $name = trim($user_name);
    $user_first_name = $name !== '' ? explode(' ', $name)[0] : 'Manager';
}
$station_id = $_SESSION['polling_station_id'] ?? 'Not assigned';
?>

    <script>
        function loadManagerStats() {
            fetch('../PHP/get_stats.php')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const stats = data.stats;
                        document.getElementById('station-voters').textContent = stats.station_voters || 0;
                        document.getElementById('station-approved').textContent = stats.station_approved || 0;
                        document.getElementById('station-votes').textContent = stats.station_votes || 0;
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        document.addEventListener('DOMContentLoaded', loadManagerStats);
        setInterval(loadManagerStats, 30000);
    </script>
