<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>create account</title>
        <link rel="stylesheet" href="/CSS/style.css">
    </head>
    <body>
        <div id="resultMessage">
            <h3></h3>
        </div>
        <form action="/PHP/create_account.php" id="form" method="POST">
            <div id="container">
                <div id="header">
                    <h2>CREATE USER ACCOUNT</h2>
                </div>
                <div id="firstname">
                    <div id="myFirstName" class="input_icon_box">
                        <img src="/IMAGES/name4.png" alt class="input_icon">
                        <input type="text" id="first_name_field"
                            placeholder="Enter first name"
                            name="first_name"><br>
                    </div>
                    <div><label id="first_name_error"></label></div>
                </div>
                <div id="lastname">
                    <div id="myLastName" class="input_icon_box">
                        <img src="/IMAGES/name4.png" alt class="input_icon">
                        <input type="text" id="last_name_field" name="last_name"
                            placeholder="Enter last name"><br>
                    </div>
                    <div><label id="last_name_error"></label></div>
                </div>
                <div id="sex">
                    <div>
                        <label for id="male_label">male</label>
                        <input type="radio" name="sex" id="male_radio"
                            value="male">
                        <label for id="female_label">female</label>
                        <input type="radio" name="sex" id="female_radio"
                            value="female"><br>
                    </div>
                    <div>
                        <label id="sex_error"></label>
                    </div>
                </div>
                <div id="contact">
                    <div class="input_icon_box">
                        <img src="/IMAGES/phone1.svg" alt class="input_icon">
                        <input type="text" id="phone_number" name="phone_number"
                            placeholder="Enter phone number"><br>
                    </div>
                    <div><label id="phone_error"></label></div>
                </div>
                <div id="email_address">
                    <div class="input_icon_box">
                        <img src="/IMAGES/email1.png" alt class="input_icon">
                        <input type="email" id="email" name="email"
                            placeholder="example@gmail.com"><br>
                    </div>
                    <div><label id="email_error"></label></div>
                </div>
                <div id="password">
                    <div class="input_icon_box">
                        <img src="/IMAGES/password.png" alt class="input_icon">
                        <input type="password" id="password_field"
                            name="password" placeholder="Enter password">
                    </div>
                    <div><label for="message" id="pass_error"></label></div>
                </div>
                <div id="confirm">
                    <div class="input_icon_box">
                        <img src="/IMAGES/password.png" alt class="input_icon">
                        <input type="password" id="confirm_field"
                            name="confirm_password"
                            placeholder="Re-enter password">
                    </div>
                    <div><label for="message" id="confirm_error"></label></div>
                </div>
                <div id="submitContainer">
                    <input type="submit" value="submit" name id="submitButton">
                </div>
                <div id="account">
                    <label for="account">Already have account?</label>
                    <a href="/HTML/loginForm.html">Login</a>
                </div>
            </div>
        </form>
        <script src="/JS/script.js"></script>
    </body>
</html>
