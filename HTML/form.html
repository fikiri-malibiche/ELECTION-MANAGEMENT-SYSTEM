<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>create account</title>
    <link rel="stylesheet" href="/CSS/style.css">
</head>
<body>
    <div id="resultMessage">
        <h3></h3>
    </div>
    <form action="/PHP/create_account.php" id="form" method="POST">
        <div id="container">
            <div id="header">
                <h2>CREATE USER ACCOUNT</h2>
            </div>
            <div id="firstname">
                <div id="myFirstName">
                <input type="text" id="first_name_field" placeholder="Enter first name" name="first_name"><br>
                </div>
                <div><label id="first_name_error"></label></div>
            </div>
            <div id="lastname">
                <div id="myLastName">
                    <input type="text" id="last_name_field" name="last_name" placeholder="Enter last name"><br>
                </div>
                <div><label id="last_name_error"></label></div> 
            </div>
            <div id="sex">
                <div>
                    <label for="" id="male_label">male</label>
                    <input type="radio" name="sex" id="male_radio" value="male">
                    <label for="" id="female_label">female</label>
                    <input type="radio" name="sex" id="female_radio" value="female"><br>
                </div>
                <div>
                    <label id="sex_error"></label>
                </div>
            </div>
            <div id="contact">
                <div >
                    <input type="text" id="phone_number" name="phone_number" placeholder="Enter phone number"><br>
                </div>
                <div><label id="phone_error"></label></div>
            </div>
            <div id="email_address">
                <div>
                    <input type="email" id="email" name="email" placeholder="example@gmail.com"><br>
                </div>
                <div><label id="email_error"></label></div>  
            </div>
            <div id="username">
                <div>
                    <input type="text" id="username_field" name="username" placeholder="Enter username">
                </div>
                <div><label for="message" id="user_error"></label></div>
            </div>
            <div id="password">
                <div>
                    <input type="password" id="password_field" name="password" placeholder="Enter password">
                </div>
                <div><label for="messge" id="pass_error"></label></div>
            </div>
            <div id="confirm">
                <div>
                    <input type="password" id="confirm_field" name="confirm_password" placeholder="Re-enter password">
                </div>
                <div><label for="message" id="confirm_error"></label></div>
            </div>
            <div id="submitContainer">
                <input type="submit" name="" id="submitButton">
            </div>
            
        </div>
    </form>
    <script src="/JS/script.js"></script>
</body>
</html>
