<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin - Mfumo wa Uchaguzi</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #container {
            background: white;
            max-width: 520px;
            width: 100%;
            padding: 40px 35px 35px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease;
            border-top: 5px solid #e74c3c;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #container h2 {
            color: #1a1a2e;
            font-size: 28px;
            text-align: center;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            font-size: 14px;
            margin-bottom: 22px;
        }

        .admin-badge {
            display: flex;
            justify-content: center;
            margin-bottom: 22px;
        }

        .admin-badge span {
            background: #e74c3c;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .input_icon_box {
            display: flex;
            align-items: center;
            background: #f5f6fa;
            border-radius: 10px;
            border: 2px solid #e8ecf1;
            transition: all 0.3s ease;
            padding: 0 15px;
            margin-bottom: 4px;
        }

        .input_icon_box:hover {
            border-color: #b0c4de;
        }

        .input_icon_box:focus-within {
            border-color: #e74c3c;
            background: #fef5f5;
            box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.1);
        }

        .input_icon {
            width: 20px;
            height: 20px;
            opacity: 0.6;
            margin-right: 12px;
        }

        .input_icon_box input {
            width: 100%;
            padding: 14px 0;
            border: none;
            background: transparent;
            font-size: 15px;
            color: #333;
            outline: none;
        }

        .input_icon_box input::placeholder {
            color: #999;
            font-size: 14px;
        }

        .input_icon_box.error {
            border-color: #dc3545 !important;
            background: #fff5f5;
        }

        .error-label {
            display: block;
            font-size: 12px;
            color: #dc3545;
            margin-top: 2px;
            margin-bottom: 8px;
            padding-left: 5px;
            min-height: 18px;
        }

        #general_error {
            display: block;
            text-align: center;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0 10px;
        }

        #general_error.error-general {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        #general_error.success-general {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        #submitContainer {
            margin-top: 18px;
            width: 100%;
            text-align: center;
        }

        #submitBtn {
            width: 100%;
            padding: 16px 20px;
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }

        #submitBtn:hover {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(231, 76, 60, 0.5);
        }

        #submitBtn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(231, 76, 60, 0.2);
        }

        .footer-links {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #666;
        }

        .footer-links a {
            color: #e74c3c;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <form id="createAdminForm" method="POST" action="../PHP/create_admin.php" novalidate>
        <div id="container">
            <h2>Create Admin Account</h2>
            <p class="subtitle">Use this form to add a new admin user. Passwords are hashed on the server.</p>
            <div class="admin-badge"><span>Admin Creation</span></div>

            <div class="input_icon_box">
                <img src="../IMAGES/name4.png" alt="first name icon" class="input_icon">
                <input type="text" name="first_name" placeholder="First name" autocomplete="given-name" required>
            </div>
            <div><label class="error-label"></label></div>

            <div class="input_icon_box">
                <img src="../IMAGES/name4.png" alt="last name icon" class="input_icon">
                <input type="text" name="last_name" placeholder="Last name" autocomplete="family-name" required>
            </div>
            <div><label class="error-label"></label></div>

            <div class="input_icon_box">
                <img src="../IMAGES/email1.png" alt="email icon" class="input_icon">
                <input type="email" name="email" placeholder="Admin email" autocomplete="email" required>
            </div>
            <div><label class="error-label"></label></div>

            <div class="input_icon_box">
                <img src="../IMAGES/phone1.svg" alt="phone icon" class="input_icon">
                <input type="tel" name="phone" placeholder="Phone number" autocomplete="tel" required>
            </div>
            <div><label class="error-label"></label></div>

            <div class="input_icon_box">
                <img src="../IMAGES/password.png" alt="password icon" class="input_icon">
                <input type="password" name="password" placeholder="Password (min 6 chars)" autocomplete="new-password" required minlength="6">
            </div>
            <div><label class="error-label"></label></div>

            <div class="input_icon_box">
                <img src="../IMAGES/password.png" alt="confirm password icon" class="input_icon">
                <input type="password" name="confirm_password" placeholder="Confirm password" autocomplete="new-password" required>
            </div>
            <div><label class="error-label"></label></div>

            <div id="general_error"></div>

            <div id="submitContainer">
                <button type="submit" id="submitBtn">Create Admin</button>
            </div>

            <div class="footer-links">
                <p><a href="adminlogin.html">Back to Admin Login</a></p>
            </div>
        </div>
    </form>
</body>
</html>
