<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Mfumo wa Uchaguzi</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <style>
        /* =============================================
           ADMIN LOGIN - STYLES MAALUM
           ============================================= */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Admin Login Container - Tofauti na login ya kawaida */
        #container {
            background: white;
            max-width: 440px;
            width: 100%;
            padding: 40px 35px 35px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease;
            border-top: 5px solid #e74c3c;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        #container h2 {
            color: #1a1a2e;
            font-size: 28px;
            text-align: center;
            margin-bottom: 5px;
        }

        #container h2 .admin-icon {
            color: #e74c3c;
        }

        .subtitle {
            color: #888;
            text-align: center;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .subtitle .lock-icon {
            color: #e74c3c;
        }

        /* Admin Badge */
        .admin-badge {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .admin-badge span {
            background: #e74c3c;
            color: white;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* =============================================
           INPUT FIELDS
           ============================================= */

        .input_icon_box {
            display: flex;
            align-items: center;
            background: #f5f6fa;
            border-radius: 10px;
            border: 2px solid #e8ecf1;
            transition: all 0.3s ease;
            padding: 0 15px;
            margin-bottom: 4px;
        }

        .input_icon_box:hover {
            border-color: #b0c4de;
        }

        .input_icon_box:focus-within {
            border-color: #e74c3c;
            background: #fef5f5;
            box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.1);
        }

        .input_icon {
            width: 20px;
            height: 20px;
            opacity: 0.6;
            margin-right: 12px;
        }

        .input_icon_box input {
            width: 100%;
            padding: 14px 0;
            border: none;
            background: transparent;
            font-size: 15px;
            color: #333;
            outline: none;
        }

        .input_icon_box input::placeholder {
            color: #999;
            font-size: 14px;
        }

        .input_icon_box.error {
            border-color: #dc3545 !important;
            background: #fff5f5;
        }

        /* =============================================
           ERROR LABELS
           ============================================= */

        .error-label {
            display: block;
            font-size: 12px;
            color: #dc3545;
            margin-top: 2px;
            margin-bottom: 8px;
            padding-left: 5px;
            min-height: 18px;
        }

        #general_error {
            display: block;
            text-align: center;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0 5px;
        }

        #general_error.error-general {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        #general_error.success-general {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        /* =============================================
           BUTTON - ADMIN RED
           ============================================= */

        #submitContainer {
            margin-top: 22px;
            width: 100%;
            text-align: center;
        }

        #submitBtn {
            width: 100%;
            padding: 16px 20px;
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }

        #submitBtn:hover {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(231, 76, 60, 0.5);
        }

        #submitBtn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(231, 76, 60, 0.2);
        }

        #submitBtn .button-text {
            transition: opacity 0.3s;
            font-size: 18px;
        }

        #submitBtn .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        #submitBtn.loading .button-text {
            opacity: 0.7;
        }

        #submitBtn.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* =============================================
           FOOTER LINKS
           ============================================= */

        .footer-links {
            text-align: center;
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid #e8ecf1;
            font-size: 14px;
            color: #666;
        }

        .footer-links a {
            color: #1a3a6b;
            font-weight: bold;
            text-decoration: none;
            margin-left: 5px;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #e74c3c;
            text-decoration: underline;
        }

        .footer-links .voter-link {
            color: #2980b9;
        }

        .footer-links .voter-link:hover {
            color: #1a3a6b;
        }

        /* =============================================
           PASSWORD TOGGLE
           ============================================= */

        .password-toggle {
            cursor: pointer;
            padding: 0 10px;
            font-size: 18px;
            user-select: none;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .password-toggle:hover {
            opacity: 1;
        }

        /* =============================================
           SECURITY NOTE
           ============================================= */

        .security-note {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
        }

        .security-note .shield {
            color: #27ae60;
        }

        /* =============================================
           RESPONSIVE
           ============================================= */

        @media (max-width: 500px) {
            #container {
                padding: 25px 18px 20px;
            }

            #container h2 {
                font-size: 22px;
            }

            .input_icon_box input {
                font-size: 14px;
                padding: 12px 0;
            }

            #submitBtn {
                padding: 14px 16px;
                font-size: 16px;
                border-radius: 8px;
            }

            #submitBtn .button-text {
                font-size: 16px;
            }
        }

        @media (max-width: 380px) {
            #container {
                padding: 20px 14px 16px;
            }

            #container h2 {
                font-size: 20px;
            }

            #submitBtn {
                padding: 12px 14px;
                font-size: 14px;
            }

            .admin-badge span {
                font-size: 11px;
                padding: 4px 14px;
            }
        }

        /* =============================================
           RESULT MESSAGE (Popup)
           ============================================= */

        #resultMessage {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            min-width: 280px;
            max-width: 500px;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.2);
            animation: slideDown 0.5s ease;
            display: none;
        }

        #resultMessage.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        #resultMessage.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        #resultMessage.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        #resultMessage .close-btn {
            position: absolute;
            top: 8px;
            right: 12px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: inherit;
            opacity: 0.6;
        }

        #resultMessage .close-btn:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Result Message -->
    <div id="resultMessage" style="display: none;">
        <div id="messageContent"></div>
    </div>

    <!-- Admin Login Form -->
    <form id="adminLoginForm" method="POST" action="../PHP/adminLogin.php" novalidate>
        <div id="container">

            <!-- Header -->
            <div>
                <h2><span class="admin-icon">🔐</span> ADMIN LOGIN</h2>
                <p class="subtitle"><span class="lock-icon">🔒</span> Ingia kama Msimamizi Mkuu</p>
            </div>

            <!-- Admin Badge -->
            <div class="admin-badge">
                <span>🔑 ADMIN ACCESS ONLY</span>
            </div>

            <!-- EMAIL -->
            <div id="usercontainer">
                <div class="input_icon_box">
                    <img src="../IMAGES/email1.png" alt="email icon" class="input_icon">
                    <input type="email" id="email" 
                        name="email"
                        placeholder="Enter admin email"
                        autocomplete="email"
                        required>
                </div>
                <div><label id="email_error" class="error-label"></label></div>
            </div>

            <!-- PASSWORD -->
            <div id="passwordcontainer">
                <div class="input_icon_box">
                    <img src="../IMAGES/password.png" alt="password icon" class="input_icon">
                    <input type="password" name="password" id="password"
                        placeholder="Enter admin password"
                        required>
                </div>
                <div><label id="pass_error" class="error-label"></label></div>
            </div>

            <!-- General Error -->
            <div id="messageContainer">
                <label id="general_error" class="error-label"></label>
            </div>

            <!-- SUBMIT BUTTON -->
            <div id="submitContainer">
                <button type="submit" id="submitBtn">
                    <span class="button-text">🔑 Login as Admin</span>
                    <span class="spinner" aria-hidden="true"></span>
                </button>
            </div>

            <!-- Footer Links -->
            <div class="footer-links">
                <span>Not an admin?</span>
                <a href="/HTML/login.html" class="voter-link">🗳️ Voter Login</a>
            </div>

            <!-- Security Note -->
            <div class="security-note">
                <span class="shield">🛡️</span> This is a secure admin area
            </div>

        </div>
    </form>

    <script src="../JS/adminLogin.js"></script>
</body>
</html>
