<!-- /HTML/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mfumo wa Uchaguzi</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a3a6b 0%, #2a5a8b 50%, #f5b041 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #container {
            background: white;
            max-width: 440px;
            width: 100%;
            padding: 40px 35px 35px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #container h2 {
            color: #1a3a6b;
            font-size: 28px;
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #777;
            text-align: center;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .admin-link.top-right {
            position: fixed;
            top: 20px;
            right: 25px;
            z-index: 100;
        }

        .admin-link.top-right a {
            color: white;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .admin-link.top-right a:hover {
            background: rgba(0, 0, 0, 0.5);
        }

        .input_icon_box {
            display: flex;
            align-items: center;
            background: #f5f6fa;
            border-radius: 10px;
            border: 2px solid #e8ecf1;
            transition: all 0.3s ease;
            padding: 0 15px;
            margin-bottom: 4px;
        }

        .input_icon_box:hover {
            border-color: #b0c4de;
        }

        .input_icon_box:focus-within {
            border-color: #1a3a6b;
            background: #f0f3ff;
            box-shadow: 0 0 0 4px rgba(26, 58, 107, 0.1);
        }

        .input_icon {
            width: 20px;
            height: 20px;
            opacity: 0.6;
            margin-right: 12px;
        }

        .input_icon_box input {
            width: 100%;
            padding: 14px 0;
            border: none;
            background: transparent;
            font-size: 15px;
            color: #333;
            outline: none;
        }

        .input_icon_box input::placeholder {
            color: #999;
            font-size: 14px;
        }

        .input_icon_box.error {
            border-color: #dc3545 !important;
            background: #fff5f5;
        }

        .error-label {
            display: block;
            font-size: 12px;
            color: #dc3545;
            margin-top: 2px;
            margin-bottom: 8px;
            padding-left: 5px;
            min-height: 18px;
        }

        #general_error {
            display: block;
            text-align: center;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0 5px;
        }

        #general_error.error-general {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        #general_error.success-general {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        #submitContainer {
            margin-top: 22px;
            width: 100%;
            text-align: center;
        }

        #submitBtn {
            width: 100%;
            padding: 16px 20px;
            background: linear-gradient(135deg, #1a3a6b, #2a5a8b);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            box-shadow: 0 4px 15px rgba(26, 58, 107, 0.3);
        }

        #submitBtn:hover {
            background: linear-gradient(135deg, #2a5a8b, #1a3a6b);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(26, 58, 107, 0.4);
        }

        #submitBtn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(26, 58, 107, 0.2);
        }

        #submitBtn .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        #submitBtn.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer-links {
            text-align: center;
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid #e8ecf1;
            font-size: 14px;
            color: #666;
        }

        .footer-links a {
            color: #1a3a6b;
            font-weight: bold;
            text-decoration: none;
            margin-left: 5px;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #f5b041;
            text-decoration: underline;
        }

        .password-toggle {
            cursor: pointer;
            padding: 0 10px;
            font-size: 18px;
            user-select: none;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .password-toggle:hover {
            opacity: 1;
        }

        #resultMessage {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            min-width: 280px;
            max-width: 500px;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.2);
            animation: slideDown 0.5s ease;
            display: none;
        }

        #resultMessage.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        #resultMessage.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        #resultMessage.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        #resultMessage .close-btn {
            position: absolute;
            top: 8px;
            right: 12px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: inherit;
            opacity: 0.6;
        }

        #resultMessage .close-btn:hover {
            opacity: 1;
        }

        @media (max-width: 500px) {
            #container {
                padding: 25px 18px 20px;
            }

            #container h2 {
                font-size: 22px;
            }

            .input_icon_box input {
                font-size: 14px;
                padding: 12px 0;
            }

            #submitBtn {
                padding: 14px 16px;
                font-size: 16px;
                border-radius: 8px;
            }

            .admin-link.top-right {
                top: 10px;
                right: 15px;
            }

            .admin-link.top-right a {
                font-size: 12px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Result Message -->
    <div id="resultMessage" style="display: none;">
        <div id="messageContent"></div>
    </div>

    <!-- Admin Login Link -->
    <div class="admin-link top-right">
        <a href="adminLogin.html">🔐 Admin Login</a>
    </div>

    <!-- ============================================= -->
    <!-- LOGIN FORM - HAKUNA ACTION (Fetch API inatumika) -->
    <!-- ============================================= -->
    
    <form id="loginForm" method="POST" novalidate>
        <div id="container">

            <div>
                <h2>🔑 LOGIN</h2>
                <p class="subtitle">Ingia kwenye mfumo wa uchaguzi</p>
            </div>

            <!-- EMAIL -->
            <div id="usercontainer">
                <div class="input_icon_box">
                    <img src="../IMAGES/email1.png" alt="email icon" class="input_icon">
                    <input type="email" id="email" 
                        name="email"
                        placeholder="Enter your email"
                        autocomplete="email"
                        required>
                </div>
                <div><label id="email_error" class="error-label"></label></div>
            </div>

            <!-- PASSWORD -->
            <div id="passwordcontainer">
                <div class="input_icon_box">
                    <img src="../IMAGES/password.png" alt="password icon" class="input_icon">
                    <input type="password" name="password" id="password"
                        placeholder="Enter your password"
                        required>
                </div>
                <div><label id="pass_error" class="error-label"></label></div>
            </div>

            <!-- General Error -->
            <div id="messageContainer">
                <label id="general_error" class="error-label"></label>
            </div>

            <!-- SUBMIT -->
            <div id="submitContainer">
                <button type="submit" id="submitBtn">
                    <span class="button-text">🔓 Login</span>
                    <span class="spinner" aria-hidden="true"></span>
                </button>
            </div>

            <!-- Footer -->
            <div class="footer-links">
                <span>Don't have an account?</span>
                <a href="register.html" class="footer-link">Register here</a>
            </div>

        </div>
    </form>

    <!-- ============================================= -->
    <!-- LOGIN.JS - INATUMIA FETCH API -->
    <!-- ============================================= -->
    <script src="../JS/login.js"></script>

</body>
</html>
